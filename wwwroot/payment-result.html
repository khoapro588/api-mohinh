<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết Quả Giao Dịch | ModelStore</title>
    <link rel="stylesheet" href="style.css?v=1.7">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .result-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 4rem 3rem;
            max-width: 550px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            position: relative;
            overflow: hidden;
        }
        .result-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: var(--gold);
            display: none;
        }
        .result-card.success::before { display: block; background: #2ecc71; }
        .result-card.failed::before { display: block; background: var(--red); }
        
        .icon-wrap {
            width: 90px; height: 90px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 1.5rem;
            position: relative;
        }
        
        .success .icon-wrap { background: rgba(46, 204, 113, 0.1); color: #2ecc71; border: 2px solid #2ecc71; }
        .success .icon-wrap::after {
            content:''; position:absolute; inset:-10px; border-radius:50%; border:1px solid rgba(46, 204, 113, 0.3);
            animation: pulseSuccess 2s infinite;
        }
        
        .failed .icon-wrap { background: rgba(231, 76, 60, 0.1); color: var(--red); border: 2px solid var(--red); }

        @keyframes pulseSuccess {
            0% { transform: scale(0.9); opacity: 1; }
            100% { transform: scale(1.3); opacity: 0; }
        }

        h1 { font-family: var(--heading); font-size: 2.2rem; margin-bottom: 0.8rem; }
        .success h1 { color: #2ecc71; }
        .failed h1 { color: var(--red); }

        p.desc { color: var(--muted); font-size: 1.05rem; line-height: 1.6; margin-bottom: 2rem; }
        .error-code { display: inline-block; background: var(--bg3); padding: 4px 12px; border-radius: 6px; font-family: monospace; font-size: 0.9rem; color: var(--text); margin-top: 0.5rem; }

        .btn-group { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
        .btn {
            padding: 0.9rem 2rem;
            border-radius: 8px;
            font-size: 0.95rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; transition: all 0.2s; text-decoration: none;
            display: inline-flex; align-items: center; gap: 0.5rem;
        }
        .btn-primary-custom { background: var(--gold); color: #000; border: none; }
        .btn-primary-custom:hover { background: #e8c84a; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(212,175,55,0.3); }
        .btn-ghost-custom { background: transparent; color: var(--text); border: 1px solid var(--border); }
        .btn-ghost-custom:hover { border-color: var(--gold); color: var(--gold); }
    </style>
</head>
<body>

    <div class="result-card" id="resultCard">
        <!-- Content injected via JS -->
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const status = urlParams.get('status');
            const code = urlParams.get('code');
            const card = document.getElementById('resultCard');

            if (status === 'success') {
                card.classList.add('success');
                card.innerHTML = `
                    <div class="icon-wrap"><i class="fas fa-check"></i></div>
                    <h1>Thanh Toán Thành Công!</h1>
                    <p class="desc">Cảm ơn bạn đã mua sắm tại ModelStore. Đơn hàng của bạn đã được ghi nhận và đang trong quá trình xử lý. Chúng tôi sẽ sớm liên hệ với bạn.</p>
                    <div class="btn-group">
                        <a href="index.html" class="btn btn-primary-custom"><i class="fas fa-store"></i> Tiếp Tục Mua Sắm</a>
                    </div>
                `;
            } else if (status === 'failed') {
                card.classList.add('failed');
                let reason = "Giao dịch bị từ chối hoặc đã bị hủy.";
                if (code === "24") reason = "Giao dịch đã bị hủy bởi người dùng.";
                else if (code === "11") reason = "Chưa thanh toán (Pending).";
                else if (code === "12") reason = "Thẻ/Tài khoản bị khóa.";
                else if (code === "51") reason = "Tài khoản không đủ số dư.";
                else if (code === "75") reason = "Ngân hàng thanh toán đang bảo trì.";
                else if (code === "79") reason = "Nhập sai mật khẩu thanh toán quá số lần quy định.";

                card.innerHTML = `
                    <div class="icon-wrap"><i class="fas fa-times"></i></div>
                    <h1>Thanh Toán Thất Bại</h1>
                    <p class="desc">${reason}<br><span class="error-code">Mã lỗi VNPay: ${code || 'Unknown'}</span></p>
                    <div class="btn-group">
                        <a href="checkout.html" class="btn btn-primary-custom"><i class="fas fa-redo"></i> Thử Lại Lần Nữa</a>
                        <a href="index.html" class="btn btn-ghost-custom"><i class="fas fa-home"></i> Về Trang Chủ</a>
                    </div>
                `;
            } else {
                card.classList.add('failed');
                card.innerHTML = `
                    <div class="icon-wrap" style="color:#f39c12; border-color:#f39c12; background:rgba(243,156,18,0.1);"><i class="fas fa-exclamation-triangle"></i></div>
                    <h1 style="color:#f39c12">Dữ Liệu Không Hợp Lệ</h1>
                    <p class="desc">Không thể xác thực thông tin giao dịch. Vui lòng liên hệ bộ phận hỗ trợ nếu bạn đã bị trừ tiền.</p>
                    <div class="btn-group">
                        <a href="index.html" class="btn btn-primary-custom"><i class="fas fa-home"></i> Về Trang Chủ</a>
                    </div>
                `;
            }
        });
    </script>

</body>
</html>
